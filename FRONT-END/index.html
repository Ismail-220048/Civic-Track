<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI SaaS Landing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#05061a;
height:100vh;
overflow:hidden;
color:white;
}

/* PARTICLE CANVAS */

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* LOGO */

.logo{
position:absolute;
top:20px;
left:40px;
font-weight:600;
color:#00ffc3;
font-size:18px;
z-index:10;
}

/* NAVBAR */

nav{
position:absolute;
top:20px;
right:40px;
display:flex;
gap:35px;
align-items:center;
z-index:10;
}

nav a{
color:#aaa;
text-decoration:none;
font-size:14px;
position:relative;
transition:0.3s;
}

/* NAV HOVER EFFECT */

nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0%;
height:2px;
background:linear-gradient(90deg,#00ffc3,#7b6cff);
transition:0.4s;
}

nav a:hover{
color:white;
}

nav a:hover::after{
width:100%;
}

/* NAV BUTTON */

nav button{
background:linear-gradient(45deg,#00ffc3,#7b6cff);
border:none;
padding:8px 22px;
border-radius:25px;
cursor:pointer;
font-weight:600;
color:white;
box-shadow:0 0 15px rgba(0,255,200,0.6);
transition:0.3s;
}

nav button:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,255,200,0.9);
}

/* LOGIN PANEL LEFT CENTER */

.login-panel{
position:absolute;
left:60px;
top:50%;
transform:translateY(-50%);
width:260px;
z-index:10;
}

.login-panel img{
width:70px;
opacity:.7;
margin-bottom:20px;
}

/* INPUT */

.input-box{
margin-bottom:15px;
}

.input-box input {
width:100%;
padding:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
color:white;
outline:none;
}

/* LOGIN BUTTON */

.login-btn{
margin-top:10px;
width:100%;
padding:11px;
background:linear-gradient(45deg,#6c63ff,#8f7bff);
border:none;
border-radius:20px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(120,100,255,0.6);
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(120,100,255,1);
}

/* HERO CENTER */

.center{
position:absolute;
top:50%;
left:55%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.center h1{
font-size:85px;
font-weight:700;
letter-spacing:3px;
background:linear-gradient(90deg,#ffffff,#8f7bff);
-webkit-background-clip:text;
color:transparent;
}

.center p{
color:#aaa;
margin-top:15px;
max-width:420px;
}

/* HORIZON GLOW */

.horizon{
position:absolute;
top:55%;
left:60%;
transform:translateX(-50%);
width:900px;
height:400px;
border-radius:50%;
background:radial-gradient(circle at center,
rgba(139,92,246,0.9) 0%,
rgba(0,0,0,0) 65%);
filter:blur(45px);
animation:glowPulse 6s infinite alternate;
}

@keyframes glowPulse{

0%{
transform:translateX(-50%) scale(1);
opacity:.6;
}

100%{
transform:translateX(-50%) scale(1.2);
opacity:1;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="logo">Civic-Track</div>

<nav>
<a href="#">Home</a>

<a href="#">Features</a>

<a href="#">Reviews</a>
<button>Sign In</button>
</nav>

<div class="login-panel">

<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<div class="input-box">
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<button class="login-btn">LOGIN</button>

</div>

<div class="horizon"></div>

<div class="center">
<h1>Welcome.</h1>
<p>Design futuristic AI interfaces with interactive neural networks and beautiful motion effects.</p>
</div>

<script>

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
const mouse={x:null,y:null}

window.addEventListener("mousemove",(e)=>{
mouse.x=e.x
mouse.y=e.y
})

for(let i=0;i<130;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=p.vx
p.y+=p.vy

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="#8f7bff"
ctx.fill()

for(let j=i;j<particles.length;j++){

let dx=p.x-particles[j].x
let dy=p.y-particles[j].y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(particles[j].x,particles[j].y)
ctx.strokeStyle="rgba(140,120,255,0.25)"
ctx.stroke()

}

}

if(mouse.x){

let dx=p.x-mouse.x
let dy=p.y-mouse.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<150){

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.strokeStyle="rgba(0,255,200,0.6)"
ctx.stroke()

}

}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
