<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CitizenConnect - Report Issue</title>

<link rel="stylesheet" href="submit-compilaint.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>
    <!-- TOP NAVBAR -->

<div class="topbar">

<div class="logo">CitizenConnect</div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">My Complaints</a>
</div>

<div class="user">
<span id="topUser">Citizen</span>
</div>

</div>

<div class="dashboard-container">
<!-- LEFT SIDEBAR -->
<div class="sidebar">

<h3>Menu</h3>

<ul>
<li>Dashboard</li>
<li>My Complaints</li>
<li>Track Complaint</li>
</ul>

</div>
<div class="content">
<div class="content-layout">

<!-- LEFT SIDE -->

<div class="main-form">
    <h2 class="welcome">Welcome, <span id="citizenName">Citizen</span></h2>

<div class="card">

<h2>Report a Local Issue</h2>

<form id="complaintForm">

<div class="form-layout">

<div class="form-left">

<label>Complaint Title</label>
<input type="text" placeholder="Enter your complaint" required>

<label>Name</label>
<input type="text"  id="nameInput" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Complaint Category</label>
<select>
<option>Road Issue</option>
<option>Garbage</option>
<option>Street Light</option>
</select>

<label>Description</label>
<textarea required></textarea>

<button type="submit">Submit Complaint</button>

</div>


<div class="form-right">

<label>Take or Upload Image</label>
<input type="file" id="imageUpload" accept="image/*" capture="environment">

<img id="preview" style="display:none; width:100%; margin-top:10px;">

<label>Select Problem Location</label>

<div id="map"></div>

<input type="text" id="latitude" placeholder="Latitude" readonly>
<input type="text" id="longitude" placeholder="Longitude" readonly>

</div>

</div>

</form>

</div>

</div>


</div>

</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>

const nameInput = document.getElementById("nameInput");
const citizenName = document.getElementById("citizenName");
const topUser = document.getElementById("topUser");

nameInput.addEventListener("input", function(){
    if(nameInput.value.trim() !== ""){
        citizenName.textContent = nameInput.value;
        topUser.textContent = nameInput.value;
    } else {
        citizenName.textContent = "Citizen";
        topUser.textContent = "Citizen";
    }
});
document.getElementById("complaintForm").addEventListener("submit", function(e){
e.preventDefault();

/* Generate Complaint ID */

var year = new Date().getFullYear();
var random = Math.floor(1000 + Math.random() * 9000);
var complaintID = "CC-" + year + "-" + random;

/* Show success message */

alert("Complaint submitted successfully!\nComplaint ID: " + complaintID);

/* Reset form */

document.getElementById("preview").style.display = "none";
if(marker){
    map.removeLayer(marker);
}
this.reset();

});

/* Image preview */

document.getElementById("imageUpload").addEventListener("change", function(event){

const file = event.target.files[0];
if(file.size > 5 * 1024 * 1024){
alert("Image size should be less than 5MB");
return;
}
const preview = document.getElementById("preview");

if(file){

preview.src = URL.createObjectURL(file);
preview.style.display = "block";

/* Read GPS data from image */

EXIF.getData(preview, function(){

var lat = EXIF.getTag(this, "GPSLatitude");
var lon = EXIF.getTag(this, "GPSLongitude");
var latRef = EXIF.getTag(this, "GPSLatitudeRef");
var lonRef = EXIF.getTag(this, "GPSLongitudeRef");

if(lat && lon){

function convertDMSToDD(dms, ref){
var dd = dms[0] + dms[1]/60 + dms[2]/3600;
if(ref === "S" || ref === "W"){
dd = dd * -1;
}
return dd;
}

var latitude = convertDMSToDD(lat, latRef);
var longitude = convertDMSToDD(lon, lonRef);

/* Move map to image location */

map.setView([latitude, longitude], 15);

if(marker){
map.removeLayer(marker);
}

marker = L.marker([latitude, longitude]).addTo(map);

document.getElementById("latitude").value = latitude;
document.getElementById("longitude").value = longitude;

}else{
alert("Location data not found in image");
}

});

}

});


/* Map */

var map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);
var marker;
navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

map.setView([lat, lon], 15);

marker = L.marker([lat, lon]).addTo(map);

document.getElementById("latitude").value = lat;
document.getElementById("longitude").value = lon;

}, function(){
console.log("Location permission denied");
});


map.on('click', function(e){

if(marker){
map.removeLayer(marker);
}

marker = L.marker(e.latlng).addTo(map);

document.getElementById("latitude").value = e.latlng.lat;
document.getElementById("longitude").value = e.latlng.lng;

});

</script>
</body>
</html>
